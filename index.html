<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100に近づけゲーム</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f0f8ff;
}
h1 { margin-top: 20px; }

#cards {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px;
}

.card {
  width: 80px;
  height: 120px;
  border-radius: 10px;
  background: white;
  border: 2px solid #ccc;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 18px;
}

.selected {
  border: 3px solid red;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>100に近づけゲーム</h1>
<p>5枚から3枚選んで100に近づけよう！（超えたら失敗）</p>

<div id="cards"></div>

<button onclick="judge()">判定</button>
<p id="result"></p>

<script>
const snacks = ["🍩","🍫","🍪","🍎","🍰","🍭","🍿","🧁"];

let cards = [];
let selected = [];

function generateCards() {
  const container = document.getElementById("cards");
  container.innerHTML = "";
  cards = [];
  selected = [];

  for (let i = 0; i < 5; i++) {
    let point = Math.floor(Math.random() * 100) + 1;
    let snack = snacks[Math.floor(Math.random() * snacks.length)];

    cards.push(point);

    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<div>${snack}</div><div>${point}</div>`;

    div.onclick = () => toggleSelect(i, div);

    container.appendChild(div);
  }

  document.getElementById("result").textContent = "";
}

function toggleSelect(index, element) {
  if (selected.includes(index)) {
    selected = selected.filter(i => i !== index);
    element.classList.remove("selected");
  } else {
    if (selected.length >= 3) return;
    selected.push(index);
    element.classList.add("selected");
  }
}

function judge() {
  if (selected.length !== 3) {
    document.getElementById("result").textContent = "3枚選んでください";
    return;
  }

  let sum = selected.reduce((acc, i) => acc + cards[i], 0);

  if (sum > 100) {
    document.getElementById("result").textContent = `合計 ${sum} → 100オーバーで失敗`;
  } else {
    document.getElementById("result").textContent =
      `合計 ${sum} → 100まであと ${100 - sum}`;
  }
}

generateCards();
</script>

</body>
</html>
