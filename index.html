<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100に近づけゲーム</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f0f8ff;
}

#cards {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px;
  flex-wrap: wrap;
}

.card {
  width: 80px;
  height: 120px;
  border-radius: 10px;
  background: white;
  border: 2px solid #ccc;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 18px;
  overflow: hidden;
}

.card-photo {
  width: 64px;
  height: 64px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 8px;
}

.selected {
  border: 3px solid red;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>100に近づけゲーム</h1>
<p>5枚から3枚選んで100に近づけよう！（超えたら失敗）</p>

<div id="cards"></div>

<button onclick="judge()">判定</button>
<button onclick="generateCards()">リセット</button>

<p id="result"></p>
<p id="answer"></p>

<audio id="seikai" src="seikai.mp3"></audio>
<audio id="zannen" src="zannen.mp3"></audio>

<script>
const photos = [
  "IMG_3309.JPG",
  "IMG_3310.JPG",
  "IMG_3311.JPG",
  "IMG_3312.PNG",
  "IMG_3313.PNG",
  "IMG_3314.JPG",
  "IMG_3315.JPG",
  "IMG_3316.JPG"
];

let cards = [];
let selected = [];
let bestSum = 0;
let triedWrong = false;

function playSound(id) {
  const audio = document.getElementById(id);

  if (!audio) return;

  audio.pause();
  audio.currentTime = 0;

  audio.play().catch(() => {
  });
}

function getCombinations(arr) {
  const comb = [];

  for (let i = 0; i < 5; i++) {
    for (let j = i + 1; j < 5; j++) {
      for (let k = j + 1; k < 5; k++) {
        comb.push([arr[i], arr[j], arr[k]]);
      }
    }
  }

  return comb;
}

function generateValidCards() {
  while (true) {
    const temp = Array.from(
      { length: 5 },
      () => Math.floor(Math.random() * 100) + 1
    );

    const combs = getCombinations(temp);
    const under100 = combs.filter(c => c[0] + c[1] + c[2] <= 100);

    if (under100.length >= 5) {
      bestSum = Math.max(...under100.map(c => c[0] + c[1] + c[2]));
      return temp;
    }
  }
}

function generateCards() {
  const container = document.getElementById("cards");

  container.textContent = "";
  document.getElementById("result").textContent = "";
  document.getElementById("answer").textContent = "";

  cards = generateValidCards();
  selected = [];
  triedWrong = false;

  for (let i = 0; i < 5; i++) {
    const photo = photos[Math.floor(Math.random() * photos.length)];

    const div = document.createElement("div");
    div.className = "card";
    div.onclick = () => toggleSelect(i, div);

    const img = document.createElement("img");
    img.className = "card-photo";
    img.src = photo;
    img.alt = "カードの写真";

    const number = document.createElement("div");
    number.textContent = cards[i];

    div.appendChild(img);
    div.appendChild(number);
    container.appendChild(div);
  }
}

function toggleSelect(index, element) {
  if (selected.includes(index)) {
    selected = selected.filter(i => i !== index);
    element.classList.remove("selected");
    return;
  }

  if (selected.length >= 3) return;

  selected.push(index);
  element.classList.add("selected");
}

function judge() {
  if (selected.length !== 3) {
    document.getElementById("result").textContent = "3枚選んでください";
    return;
  }

  const sum = selected.reduce((acc, i) => acc + cards[i], 0);

  if (sum > 100) {
    document.getElementById("result").textContent = `合計 ${sum} → 失敗`;
    playSound("zannen");
    triedWrong = true;
    return;
  }

  const diff = 100 - sum;

  if (sum === bestSum) {
    document.getElementById("result").textContent =
      `合計 ${sum} → 最適解！`;
    playSound("seikai");
    triedWrong = false;
  } else {
    document.getElementById("result").textContent =
      `合計 ${sum} → あと ${diff}`;
    playSound("zannen");

    if (triedWrong) {
      document.getElementById("answer").textContent =
        `最適解は ${bestSum}`;
    } else {
      triedWrong = true;
    }
  }
}

generateCards();
</script>

</body>
</html>
